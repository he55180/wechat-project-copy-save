name: HSE Daily News

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Custom keywords (space separated)'
        required: false
        default: ''
      top_n:
        description: 'Top N articles'
        required: false
        default: '20'

env:
  PYTHON_VERSION: '3.11'

jobs:
  fetch-and-send:
    name: Fetch Filter Send
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Fetch and Filter News
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.keywords }}" ]; then
            EXTRA_ARGS="--keywords ${{ github.event.inputs.keywords }}"
          fi
          if [ -n "${{ github.event.inputs.top_n }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --top ${{ github.event.inputs.top_n }}"
          fi
          python fetch_news.py $EXTRA_ARGS

      - name: Read and Convert Report
        id: report
        run: |
          pip install markdown
          if [ -f "output/latest_report.md" ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
            python -c "
import markdown
with open('output/latest_report.md', 'r', encoding='utf-8') as f:
    md_content = f.read()
html_content = markdown.markdown(md_content, extensions=['tables', 'fenced_code'])
with open('output/report.html', 'w', encoding='utf-8') as f:
    f.write(html_content)
print('Markdown converted to HTML')
"
            echo "report_content<<EOF" >> $GITHUB_OUTPUT
            cat output/report.html >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Report
        if: steps.report.outputs.report_exists == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[HSE Daily] Safety News - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: "HSE News Bot <${{ secrets.MAIL_USERNAME }}>"
          html_body: |
            <!DOCTYPE html>
            <html>
            <head>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
                h1 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
                h2 { color: #34a853; margin-top: 30px; }
                a { color: #1a73e8; text-decoration: none; }
                a:hover { text-decoration: underline; }
                table { border-collapse: collapse; width: 100%; margin: 20px 0; }
                th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                th { background: #f8f9fa; }
                .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; color: #666; font-size: 12px; }
              </style>
            </head>
            <body>
              ${{ steps.report.outputs.report_content }}
              <div class="footer">
                <p>This email was sent automatically by HSE News Automation System</p>
                <p>GitHub Actions Run ID: ${{ github.run_id }}</p>
              </div>
            </body>
            </html>

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hse-daily-report-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Commit Report to Repo
        if: steps.report.outputs.report_exists == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p reports/$(date +'%Y/%m')
          cp output/latest_report.md "reports/$(date +'%Y/%m')/$(date +'%Y-%m-%d').md"
          git add reports/
          git diff --staged --quiet || git commit -m "Auto archive: $(date +'%Y-%m-%d') HSE Daily Report"
          git push || echo "No changes to push"

  notify-on-failure:
    name: Failure Notification
    runs-on: ubuntu-latest
    needs: fetch-and-send
    if: failure()

    steps:
      - name: Send Failure Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[HSE System Alert] Automation Failed - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_USERNAME }}
          from: "HSE System Alert <${{ secrets.MAIL_USERNAME }}>"
          body: |
            HSE News Automation System failed!
            
            Run ID: ${{ github.run_id }}
            
            Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
