name: HSE News Auto

on:
  schedule:
    # Runs at 01:00 UTC every day
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  # Grant write permission to commit the report back to the repo
  contents: write

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai requests feedparser python-dateutil tenacity python-dotenv

      - name: Generate Report
        id: generate
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python fetch_news.py

      - name: Archive Report and Get Link
        id: archive
        run: |
          # Set up git user
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          
          # Create a dated file for historical record
          report_date=$(date +'%Y-%m-%d')
          archive_dir="reports/${report_date}"
          mkdir -p "${archive_dir}"
          cp output/latest_report.md "${archive_dir}/hse-briefing-${report_date}.md"
          
          # Also copy to a 'latest' file for a stable URL
          cp output/latest_report.md reports/latest_briefing.md

          git add reports/
          # Commit only if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Auto-archive HSE briefing for ${report_date}"
            git push
          else
            echo "No changes to the report to commit."
          fi
          
          # Set the URL for the email step
          report_url="https://github.com/${{ github.repository }}/blob/main/reports/latest_briefing.md"
          echo "report_url=${report_url}" >> $GITHUB_OUTPUT
          
      - name: Send Notification Email
        uses: dawidd6/action-send-mail@v3.8.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ HSE Daily AI Briefing is Ready (${{ env.report_date }})"
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: "HSE AI Assistant <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Dear Director,

            Today's HSE briefing has been automatically generated.

            You can view the latest report here:
            ${{ steps.archive.outputs.report_url }}

            Best regards,
            HSE News Automation System
          
  alert-on-failure:
    runs-on: ubuntu-latest
    needs: build-and-send
    if: failure()
    steps:
      - name: Send Failure Alert
        uses: dawidd6/action-send-mail@v3.8.0
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ HSE Daily AI Briefing FAILED"
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: "HSE AI Assistant <${{ secrets.MAIL_USERNAME }}>"
          body: "The HSE News Automation workflow failed. Please check the run details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
