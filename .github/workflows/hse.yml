name: HSE News Auto

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Keywords'
        required: false
        default: ''
      top_n:
        description: 'Top N'
        required: false
        default: '20'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  run:
    name: Fetch Filter Send
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fetch_news.py

      - name: Convert
        id: report
        run: |
          pip install markdown
          if [ ! -f "output/latest_report.md" ]; then
            echo "report_exists=false" >> $GITHUB_OUTPUT
            echo "INFO: latest_report.md not found, skipping conversion and email."
          else
            echo "report_exists=true" >> $GITHUB_OUTPUT
            python .github/workflows/convert_md_to_html.py
          fi

      - name: Send Email
        if: steps.report.outputs.report_exists == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "HSE Daily - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          from: "HSE <${{ secrets.MAIL_USERNAME }}>"
          body_path: output/report.html
          content_type: text/html

      - uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Archive
        if: steps.report.outputs.report_exists == 'true'
        run: |
          git config user.email "bot@github.com"
          git config user.name "bot"
          mkdir -p reports/$(date +'%Y/%m')
          cp output/latest_report.md "reports/$(date +'%Y/%m')/$(date +'%Y-%m-%d').md"
          git add reports/ || true
          git diff --staged --quiet || git commit -m "Auto: $(date +'%Y-%m-%d')"
          git push || true

  alert:
    runs-on: ubuntu-latest
    needs: run
    if: failure()
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "HSE Failed - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_USERNAME }}
          
          from: "HSE Alert <${{ secrets.MAIL_USERNAME }}>"
          body: "Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

